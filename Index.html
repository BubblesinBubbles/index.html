<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hi c:</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    #container {
        position: relative;
        text-align: center;
    }

    #message {
        color: white;
        font-size: 4rem;
        transition: all 1s ease;
    }

    #heart {
        color: red;
        font-size: 2rem;
        opacity: 0;
        transform: scale(0);
        transition: all 0.8s ease;
    }

    .heart-show {
        opacity: 1 !important;
        transform: scale(1.4) !important;
    }

    .heart-pulse {
        animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
        from { transform: scale(1.2); }
        to { transform: scale(1.6); }
    }

    .explode {
        transform: scale(3);
        opacity: 0;
        filter: blur(12px);
    }

    .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: white;
        pointer-events: none;
        animation: fly 1.5s forwards;
    }

    @keyframes fly {
        to {
            transform: translate(var(--x), var(--y)) scale(0);
            opacity: 0;
        }
    }

    .flash {
        position: fixed;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
    }

    .flash-active {
        animation: flashbang 0.4s ease;
    }

    @keyframes flashbang {
        0% { opacity: 1; }
        100% { opacity: 0; }
    }

    .shake {
        animation: shake 0.4s;
    }

    @keyframes shake {
        0% { transform: translate(0,0); }
        25% { transform: translate(10px,-10px); }
        50% { transform: translate(-10px,10px); }
        75% { transform: translate(8px,-8px); }
        100% { transform: translate(0,0); }
    }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div id="container">
    <div id="message">hi c:</div>
    <div id="heart">❤️</div>
</div>

<script>
    const heart = document.getElementById('heart');
    const message = document.getElementById('message');
    const flash = document.getElementById('flash');

    setTimeout(() => {
        heart.classList.add('heart-show');
    }, 1000);

    setTimeout(() => {
        heart.classList.add('heart-pulse');
    }, 1800);

    setTimeout(() => {
        explode();
    }, 3000);

    function explode() {
        heart.classList.remove('heart-pulse');
        message.classList.add('explode');
        heart.classList.add('explode');

        flash.classList.add('flash-active');
        document.body.classList.add('shake');

        for (let i = 0; i < 120; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';

            particle.style.left = `${window.innerWidth/2}px`;
            particle.style.top = `${window.innerHeight/2}px`;

            particle.style.setProperty('--x', `${(Math.random()-0.5)*800}px`);
            particle.style.setProperty('--y', `${(Math.random()-0.5)*800}px`);

            particle.style.background = `hsl(${Math.random()*360},100%,70%)`;

            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 1500);
        }

        setTimeout(() => {
            message.remove();
            heart.remove();
        }, 1200);
    }
</script>

</body>
</html>
